# === Приложение ===
spring.application.name=order-service
server.port=8080
outbox.poll-interval=5000

# === База данных ===
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/order_service}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:order_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:order_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# === Flyway ===
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# === Логирование ===
logging.level.by.shaaldy.orderservice=DEBUG

# === Кафка ===
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Consumer — десериализация из JSON
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Доверие пакетам + игнор заголовков типа от чужого сервиса
spring.kafka.producer.properties.spring.json.type.mapping=\
orderCreated:by.shaaldy.orderservice.messaging.event.payment.OrderCreatedEvent,\
orderCancelled:by.shaaldy.orderservice.messaging.event.refund.OrderCancelledEvent,\
paymentProcessed:by.shaaldy.orderservice.messaging.event.payment.PaymentProcessedEvent,\
refundProcessed:by.shaaldy.orderservice.messaging.event.refund.RefundProcessedEvent

spring.kafka.consumer.properties.spring.json.type.mapping=\
paymentProcessed:by.shaaldy.orderservice.messaging.event.payment.PaymentProcessedEvent,\
refundProcessed:by.shaaldy.orderservice.messaging.event.refund.RefundProcessedEvent

